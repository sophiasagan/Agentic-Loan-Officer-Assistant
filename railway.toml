# Railway deployment configuration
# Docs: https://docs.railway.com/reference/config-as-code

[build]
builder = "nixpacks"

[build.nixpacksPlan.phases.setup]
nixPkgs = ["python311", "python311Packages.pip"]

[deploy]
startCommand = "uvicorn cu_loan_agent.api.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/docs"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Mount a persistent volume at /data so loan_history.db survives deploys.
# Create the volume in the Railway dashboard, then set:
#   LOAN_DB_PATH = /data/loan_history.db
# in the service environment variables.
